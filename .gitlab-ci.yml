# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  CVerify — Full CI/CD Pipeline                                          ║
# ║                                                                          ║
# ║  Stages:                                                                 ║
# ║    1. models  — Download ML model artifacts from Kaggle kernels          ║
# ║    2. build   — Build & push Docker images to Docker Hub                 ║
# ║    3. deploy  — Trigger Render redeploy via webhook                      ║
# ║                                                                          ║
# ║  Required GitLab CI/CD Variables (Settings → CI/CD → Variables):        ║
# ║    KAGGLE_TOKEN              — Kaggle API key                            ║
# ║    DOCKERHUB_USERNAME        — Docker Hub username                       ║
# ║    DOCKERHUB_TOKEN           — Docker Hub access token (PAT)             ║
# ║    RENDER_BACKEND_HOOK       — Render deploy hook URL for backend        ║
# ║    RENDER_FRONTEND_HOOK      — Render deploy hook URL for frontend       ║
# ╚══════════════════════════════════════════════════════════════════════════╝

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_TAG'
      when: always
    - when: never

stages:
  - models
  - build
  - deploy

variables:
  BACKEND_IMAGE: attiaimeed/cverify-backend
  FRONTEND_IMAGE: attiaimeed/cverify-frontend
  # Notebooks slugs on Kaggle (owner/kernel-slug)
  KAGGLE_KERNEL_RESUME:       "attiaimeed/resume-ml-pj"
  KAGGLE_KERNEL_RECOMMENDER:  "attiaimeed/job-recommender-model"
  KAGGLE_KERNEL_NLP:          "attiaimeed/nlp-model-comparison-for-resume-job-role-classific"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Download ML Models from Kaggle
# ─────────────────────────────────────────────────────────────────────────────
download-models:
  stage: models
  image: python:3.11-slim
  variables:
    # KAGGLE_TOKEN is the raw API key (e.g. KGAT_xxxxxx) stored in GitLab variables.
    # The Kaggle CLI reads KAGGLE_USERNAME + KAGGLE_KEY from the environment directly,
    # so no kaggle.json file is needed.
    KAGGLE_USERNAME: "attiaimeed"
    KAGGLE_KEY: "$KAGGLE_TOKEN"
  before_script:
    - pip install --quiet --no-cache-dir kaggle
    - mkdir -p backend/models
  script:
    # --- Resume ML models (classifier, salary regressor, kmeans, label encoder) ---
    - echo "📥 Downloading resume ML models from $KAGGLE_KERNEL_RESUME ..."
    - kaggle kernels output "$KAGGLE_KERNEL_RESUME" -p /tmp/models-resume
    - ls -lah /tmp/models-resume/
    - find /tmp/models-resume -name "*.pkl" -exec cp -v {} backend/models/ \;

    # --- Job Recommender v2 model ---
    - echo "📥 Downloading job recommender model from $KAGGLE_KERNEL_RECOMMENDER ..."
    - kaggle kernels output "$KAGGLE_KERNEL_RECOMMENDER" -p /tmp/models-recommender
    - ls -lah /tmp/models-recommender/
    - find /tmp/models-recommender -name "*.pkl" -exec cp -v {} backend/models/ \;

    # --- NLP job-role classifier ---
    - echo "📥 Downloading NLP classifier from $KAGGLE_KERNEL_NLP ..."
    - kaggle kernels output "$KAGGLE_KERNEL_NLP" -p /tmp/models-nlp
    - ls -lah /tmp/models-nlp/
    - find /tmp/models-nlp -name "*.pkl" -exec cp -v {} backend/models/ \;

    # --- Verify required model files are present ---
    - echo "🔍 Verifying required models..."
    - |
      REQUIRED="classifier_hire.pkl salary_predictor.pkl job_recommender_v2.pkl"
      MISSING=0
      for f in $REQUIRED; do
        if [ ! -f "backend/models/$f" ]; then
          echo "❌ Missing required model: $f"
          MISSING=1
        else
          SIZE=$(du -sh "backend/models/$f" | cut -f1)
          echo "✅ $f  ($SIZE)"
        fi
      done
      if [ "$MISSING" -eq 1 ]; then
        echo ""
        echo "Available files in backend/models/:"
        ls -lah backend/models/
        exit 1
      fi

    - echo ""
    - echo "✅ All required models downloaded. Final contents:"
    - ls -lah backend/models/
  artifacts:
    name: "ml-models-$CI_COMMIT_SHORT_SHA"
    paths:
      - backend/models/
    expire_in: 2 hours
  retry: 1

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Build & Push Docker Images
# ─────────────────────────────────────────────────────────────────────────────

# Compute image tags: always tag with short SHA + "latest".
# On a git tag (e.g. v1.2.3), also tag with the version string.
.docker_login: &docker_login
  before_script:
    # ── Diagnostic: Check if required variables are set ────────────────
    - |
      echo "🔍 Checking Docker Hub credentials..."
      if [ -z "$DOCKERHUB_USERNAME" ]; then
        echo "❌ ERROR: DOCKERHUB_USERNAME is NOT set"
        echo "   Go to GitLab → Settings → CI/CD → Variables"
        echo "   Add: DOCKERHUB_USERNAME = <your-docker-hub-username>"
        exit 1
      else
        echo "✅ DOCKERHUB_USERNAME is set: ${DOCKERHUB_USERNAME:0:5}***"
      fi
      if [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "❌ ERROR: DOCKERHUB_TOKEN is NOT set"
        echo "   Go to GitLab → Settings → CI/CD → Variables (mark as Masked)"
        echo "   Add: DOCKERHUB_TOKEN = <your-docker-hub-pat>"
        exit 1
      else
        echo "✅ DOCKERHUB_TOKEN is set (masked)"
      fi
    # ── Login to Docker Hub ────────────────────────────────────────────
    - echo "🔐 Logging into Docker Hub as $DOCKERHUB_USERNAME..."
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - echo "✅ Docker Hub login successful"

build-backend:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  needs:
    - job: download-models
      artifacts: true          # models land in backend/models/ before docker build
  <<: *docker_login
  script:
    # Determine extra version tag when pipeline was triggered by a git tag
    - |
      TAGS="-t $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $BACKEND_IMAGE:latest"
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t $BACKEND_IMAGE:$CI_COMMIT_TAG"
        echo "🏷  Version tag: $CI_COMMIT_TAG"
      fi
    - echo "🐳 Building backend image..."
    - docker build $TAGS ./backend
    - echo "📤 Pushing backend image..."
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $BACKEND_IMAGE:latest
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker push "$BACKEND_IMAGE:$CI_COMMIT_TAG"
      fi
    - echo "✅ Backend pushed → $BACKEND_IMAGE:latest ($CI_COMMIT_SHORT_SHA)"

build-frontend:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  needs: []        # No dependency on models — runs in parallel with download-models
  <<: *docker_login
  script:
    - |
      TAGS="-t $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA -t $FRONTEND_IMAGE:latest"
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t $FRONTEND_IMAGE:$CI_COMMIT_TAG"
      fi
    - echo "🐳 Building frontend image..."
    - docker build $TAGS ./frontend-angular
    - echo "📤 Pushing frontend image..."
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FRONTEND_IMAGE:latest
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker push "$FRONTEND_IMAGE:$CI_COMMIT_TAG"
      fi
    - echo "✅ Frontend pushed → $FRONTEND_IMAGE:latest ($CI_COMMIT_SHORT_SHA)"

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to Render (trigger image pull via webhook)
# ─────────────────────────────────────────────────────────────────────────────
# Add these in GitLab → Settings → CI/CD → Variables (Masked):
#   RENDER_BACKEND_HOOK  = https://api.render.com/deploy/srv-d8hlmv67r5hc73c1evog?key=XTipbY-Tods
#   RENDER_FRONTEND_HOOK = https://api.render.com/deploy/srv-d8hlq04vikkc73cvr620?key=xIoon6HUWdI

deploy-render:
  stage: deploy
  image: alpine:3.18
  needs:
    - build-backend
    - build-frontend
  before_script:
    - apk add --no-cache curl
    # ── Diagnostic: Check Render webhooks ──────────────────────────────
    - |
      echo "🔍 Checking Render webhook configuration..."
      if [ -z "$RENDER_BACKEND_HOOK" ]; then
        echo "❌ ERROR: RENDER_BACKEND_HOOK is NOT set"
        echo "   Go to GitLab → Settings → CI/CD → Variables (mark as Masked)"
        echo "   Add: RENDER_BACKEND_HOOK = https://api.render.com/deploy/srv-d8hlmv67r5hc73c1evog?key=XTipbY-Tods"
        exit 1
      else
        echo "✅ RENDER_BACKEND_HOOK is set"
      fi
      if [ -z "$RENDER_FRONTEND_HOOK" ]; then
        echo "⚠️  RENDER_FRONTEND_HOOK not set (frontend deploy will be skipped)"
      else
        echo "✅ RENDER_FRONTEND_HOOK is set"
      fi
  script:
    - echo "🚀 Triggering Render backend redeploy..."
    - |
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
        -X POST "$RENDER_BACKEND_HOOK")
      echo "Backend hook response: $RESPONSE"
      [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ] || { echo "❌ Backend hook failed ($RESPONSE)"; exit 1; }
    - echo "✅ Backend redeploy triggered"
    - echo "🚀 Triggering Render frontend redeploy..."
    - |
      if [ -n "$RENDER_FRONTEND_HOOK" ]; then
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST "$RENDER_FRONTEND_HOOK")
        echo "Frontend hook response: $RESPONSE"
        [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ] || echo "⚠️  Frontend hook failed ($RESPONSE)"
        echo "✅ Frontend redeploy triggered"
      else
        echo "⚠️  RENDER_FRONTEND_HOOK not set — skipping frontend deploy"
      fi
  only:
    - main
  environment:
    name: production
    url: https://cverify-frontend.onrender.com
